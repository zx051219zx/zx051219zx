<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>朱旭的网页</title>
		<style>
			body {
				background-color:pink;
				margin: 0;
				padding: 20px;
				min-height: 100vh;
			}
			h1,h2{
				color: #333;
			}
			img {
				display: inline-block;
				margin: 10px;
				animation: move 1s infinite alternate ease-in-out;
				position: relative;
			}
			@keyframes move{
				0%{
					transform: translate(0,0);
				}
				50%{
					transform: translate(30px,-20px);
				}
				100%{
					transform: translate(-30px,20px);
				}
			}
		</style>
	</head>
	<body>
		<h1>牛牛的网页</h1>
		<h2>姓名：牛牛</h2>
		<h2>我的年龄：5岁</h2>

		width="190"height="250"/>
		<img src="img/牛牛2.jpg"
		width="150"height="250"/>
		<img src="img/牛牛3.jpg"
		width="150"height="250"/>
		<img src="img/牛牛4.jpg"
		width="180"height="250"/>

		width="180"height="250"/>
